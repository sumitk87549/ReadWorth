<div class="container px-site" style="padding-top:1.5rem; padding-bottom:3rem;">
<div class="page-hero">
  <p class="eyebrow">Get In Touch</p>
  <h1 style="font-family:var(--font-serif); font-size:clamp(2rem,5vw,3.25rem); font-weight:900; color:var(--ink); line-height:1.1; margin:0 0 1rem;">
    Let's <span style="color:var(--accent);">Connect</span>
  </h1>
  <p style="font-size:1.0625rem; color:var(--muted); max-width:34rem; line-height:1.75;">
    Got a book suggestion? Disagree with a verdict? Want to collaborate? I read every message — reach out through whichever channel works for you.
  </p>
</div>

<!-- Contact cards grid -->
<div class="contact-grid">
  <a *ngFor="let c of contacts" [href]="c.href" target="_blank" rel="noopener noreferrer" class="contact-card">

    <!-- Icon -->
    <div class="contact-icon-wrap">
      <!-- Email -->
      <svg *ngIf="c.icon==='email'" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" d="M21.75 6.75v10.5a2.25 2.25 0 0 1-2.25 2.25h-15a2.25 2.25 0 0 1-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0 0 19.5 4.5h-15a2.25 2.25 0 0 0-2.25 2.25m19.5 0v.243a2.25 2.25 0 0 1-1.07 1.916l-7.5 4.615a2.25 2.25 0 0 1-2.36 0L3.32 8.91a2.25 2.25 0 0 1-1.07-1.916V6.75" />
      </svg>
      <!-- Phone/WhatsApp -->
      <svg *ngIf="c.icon==='phone'" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 6.75c0 8.284 6.716 15 15 15h2.25a2.25 2.25 0 0 0 2.25-2.25v-1.372c0-.516-.351-.966-.852-1.091l-4.423-1.106c-.44-.11-.902.055-1.173.417l-.97 1.293c-2.896-1.596-5.48-4.18-7.076-7.076l1.293-.97c.362-.271.527-.734.417-1.173L6.963 3.102a1.125 1.125 0 0 0-1.091-.852H4.5A2.25 2.25 0 0 0 2.25 4.5v2.25Z" />
      </svg>
      <!-- Instagram -->
      <svg *ngIf="c.icon==='instagram'" xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 24 24">
        <path fill-rule="evenodd" d="M12.315 2c2.43 0 2.784.013 3.808.06 1.064.049 1.791.218 2.427.465a4.902 4.902 0 011.772 1.153 4.902 4.902 0 011.153 1.772c.247.636.416 1.363.465 2.427.048 1.067.06 1.407.06 4.123v.08c0 2.643-.012 2.987-.06 4.043-.049 1.064-.218 1.791-.465 2.427a4.902 4.902 0 01-1.153 1.772 4.902 4.902 0 01-1.772 1.153c-.636.247-1.363.416-2.427.465-1.067.048-1.407.06-4.123.06h-.08c-2.643 0-2.987-.012-4.043-.06-1.064-.049-1.791-.218-2.427-.465a4.902 4.902 0 01-1.772-1.153 4.902 4.902 0 01-1.153-1.772c-.247-.636-.416-1.363-.465-2.427-.047-1.024-.06-1.379-.06-3.808v-.63c0-2.43.013-2.784.06-3.808.049-1.064.218-1.791.465-2.427a4.902 4.902 0 011.153-1.772A4.902 4.902 0 015.45 2.525c.636-.247 1.363-.416 2.427-.465C8.901 2.013 9.256 2 11.685 2h.63zm-.081 1.802h-.468c-2.456 0-2.784.011-3.807.058-.975.045-1.504.207-1.857.344-.467.182-.8.398-1.15.748-.35.35-.566.683-.748 1.15-.137.353-.3.882-.344 1.857-.047 1.023-.058 1.351-.058 3.807v.468c0 2.456.011 2.784.058 3.807.045.975.207 1.504.344 1.857.182.466.399.8.748 1.15.35.35.683.566 1.15.748.353.137.882.3 1.857.344 1.054.048 1.37.058 4.041.058h.08c2.597 0 2.917-.01 3.96-.058.976-.045 1.505-.207 1.858-.344.466-.182.8-.398 1.15-.748.35-.35.566-.683.748-1.15.137-.353.3-.882.344-1.857.048-1.055.058-1.37.058-4.041v-.08c0-2.597-.01-2.917-.058-3.96-.045-.976-.207-1.505-.344-1.858a3.097 3.097 0 00-.748-1.15 3.098 3.098 0 00-1.15-.748c-.353-.137-.882-.3-1.857-.344-1.023-.047-1.351-.058-3.807-.058zM12 6.865a5.135 5.135 0 110 10.27 5.135 5.135 0 010-10.27zm0 1.802a3.333 3.333 0 100 6.666 3.333 3.333 0 000-6.666zm5.338-3.205a1.2 1.2 0 110 2.4 1.2 1.2 0 010-2.4z" clip-rule="evenodd" />
      </svg>
      <!-- GitHub -->
      <svg *ngIf="c.icon==='github'" xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 24 24">
        <path fill-rule="evenodd" d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z" clip-rule="evenodd" />
      </svg>
      <!-- LinkedIn -->
      <svg *ngIf="c.icon==='linkedin'" xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 24 24">
        <path fill-rule="evenodd" d="M19 0h-14c-2.761 0-5 2.239-5 5v14c0 2.761 2.239 5 5 5h14c2.762 0 5-2.239 5-5v-14c0-2.761-2.238-5-5-5zm-11 19h-3v-11h3v11zm-1.5-12.268c-.966 0-1.75-.79-1.75-1.764s.784-1.764 1.75-1.764 1.75.79 1.75 1.764-.783 1.764-1.75 1.764zm13.5 12.268h-3v-5.604c0-3.368-4-3.113-4 0v5.604h-3v-11h3v1.765c1.396-2.586 7-2.777 7 2.476v6.759z" clip-rule="evenodd" />
      </svg>
    </div>

    <h3 class="contact-label">{{ c.label }}</h3>
    <p class="contact-desc">{{ c.desc }}</p>
    <span class="contact-handle">{{ c.display }} →</span>
  </a>
</div>

<style>
  .page-hero { padding:2.5rem 0 2rem; border-bottom:1.5px solid var(--border); margin-bottom:2.5rem; }
  .eyebrow { font-size:0.7rem; font-weight:700; text-transform:uppercase; letter-spacing:0.15em; color:var(--accent); margin-bottom:0.625rem; }
  .contact-grid { display:grid; grid-template-columns:1fr; gap:1.25rem; padding-bottom:3rem; }
  @media(min-width:540px)  { .contact-grid { grid-template-columns:1fr 1fr; } }
  @media(min-width:900px)  { .contact-grid { grid-template-columns:repeat(3,1fr); } }
  .contact-card {
    display:block; padding:1.75rem; background:var(--surface); border:1.5px solid var(--border);
    border-radius:1rem; text-decoration:none; transition:all 0.2s;
  }
  .contact-card:hover { border-color:var(--accent); box-shadow:0 8px 28px rgba(0,0,0,0.1); transform:translateY(-3px); }
  .contact-icon-wrap {
    width:2.75rem; height:2.75rem; border-radius:50%; background:color-mix(in srgb, var(--accent) 12%, transparent);
    display:flex; align-items:center; justify-content:center; color:var(--accent); margin-bottom:1.125rem;
  }
  .contact-icon-wrap svg { width:1.25rem; height:1.25rem; }
  .contact-label { font-family:var(--font-serif); font-size:1.125rem; font-weight:700; color:var(--ink); margin-bottom:0.375rem; }
  .contact-desc  { font-size:0.8375rem; color:var(--muted); line-height:1.6; margin-bottom:0.875rem; }
  .contact-handle{ font-size:0.8125rem; font-weight:600; color:var(--accent); }
</style>
</div>
