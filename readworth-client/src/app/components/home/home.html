<div class="container px-site" style="padding-top:1.5rem;">

  <!-- ══ PAGE HEADER ════════════════════════════════════════════════════════ -->
  <section style="padding:2.5rem 0 1.5rem; border-bottom:1.5px solid var(--border); margin-bottom:1.5rem;">
    <h1 style="font-family:var(--font-serif); font-size:2.25rem; font-weight:900; color:var(--ink); line-height:1.1; margin:0 0 0.5rem;">All Reviews</h1>
    <p style="color:var(--muted); font-size:1rem; margin:0;">Every verdict. Every reason. Find what's worth your time.</p>
  </section>

  <!-- ══ SEARCH + SORT BAR ══════════════════════════════════════════════════ -->
  <section style="display:flex; flex-wrap:wrap; gap:1rem; align-items:center; padding:1.25rem 0 1rem;">
    <div class="search-wrap" style="max-width:28rem; margin:0; flex:1; min-width:200px;">
      <input id="book-search-input" type="text" [(ngModel)]="searchQuery" (ngModelChange)="onSearchInput()" (keyup.enter)="onSearch()"
             placeholder="Search by title or author…" class="search-input">
      <button (click)="onSearch()" class="search-btn">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" style="width:1.125rem; height:1.125rem;">
          <path stroke-linecap="round" stroke-linejoin="round" d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.607 10.607Z" />
        </svg>
      </button>
    </div>

    <!-- Category filter pills -->
    <div style="display:flex; flex-wrap:wrap; gap:0.5rem; align-items:center;">
      <button id="filter-all" (click)="onFilter(undefined)" [class.active]="selectedCategory === undefined" class="pill">All</button>
      <button *ngFor="let cat of categories" [id]="'filter-cat-' + cat.id" (click)="onFilter(cat.id)" [class.active]="selectedCategory === cat.id" class="pill">{{ cat.name }}</button>
    </div>
  </section>

  <!-- ══ LOADING SKELETONS ═══════════════════════════════════════════════════ -->
  <div *ngIf="loading" style="display:grid; grid-template-columns:repeat(auto-fill, minmax(180px, 1fr)); gap:2rem; padding:1rem 0;">
    <div *ngFor="let i of [1,2,3,4,5,6,7,8]">
      <div class="skeleton" style="aspect-ratio:2/3; width:100%; border-radius:0.5rem;"></div>
      <div class="skeleton" style="height:1rem; margin-top:0.75rem; width:80%; border-radius:0.25rem;"></div>
      <div class="skeleton" style="height:0.75rem; margin-top:0.375rem; width:55%; border-radius:0.25rem;"></div>
    </div>
  </div>

  <!-- ══ ERROR STATE ═════════════════════════════════════════════════════════ -->
  <div *ngIf="error && !loading" style="text-align:center; padding:4rem; background:color-mix(in srgb, #dc2626 6%, transparent); border-radius:1rem; border:1.5px solid color-mix(in srgb, #dc2626 25%, transparent); margin-top:2rem;">
    <p style="color:#dc2626; font-weight:600; font-size:1.0625rem;">{{ error }}</p>
    <button (click)="loadBooks()" class="btn-primary" style="margin-top:1.25rem;">Try Again</button>
  </div>

  <!-- ══ EMPTY STATE ═════════════════════════════════════════════════════════ -->
  <div *ngIf="!loading && !error && books.length === 0" style="text-align:center; padding:5rem 2rem;">
    <p style="font-size:1.125rem; color:var(--muted);">No books found. Try a different search or filter.</p>
  </div>

  <!-- ══ BOOK GRID ═══════════════════════════════════════════════════════════ -->
  <div *ngIf="!loading && !error && books.length > 0"
       style="display:grid; grid-template-columns:repeat(auto-fill, minmax(180px, 1fr)); gap:2rem; padding:1rem 0 3rem;"
       class="fade-in">
    <a *ngFor="let book of books" [routerLink]="getBookLink(book)" class="book-card" style="text-decoration:none; cursor:pointer;">
      <div class="book-cover-wrap">
        <img *ngIf="book.coverImage" [src]="book.coverImage" [alt]="book.title" class="book-cover-img" loading="lazy">
        <div *ngIf="!book.coverImage" style="width:100%; height:100%; display:flex; align-items:center; justify-content:center; padding:1rem; text-align:center;">
          <span style="font-family:var(--font-serif); font-size:0.9rem; font-weight:700; color:var(--muted); line-height:1.3;">{{ book.title }}</span>
        </div>
        <span class="verdict-badge" [class]="getVerdictClass(book.verdict)">{{ getVerdictLabel(book.verdict) }}</span>
      </div>

      <h3 class="book-title">{{ book.title }}</h3>
      <p class="book-author">{{ book.authorName }}</p>

      <div class="stars">
        <svg *ngFor="let _ of getStars(book.ourRating)" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" style="width:0.875rem; height:0.875rem;">
          <path fill-rule="evenodd" d="M10.788 3.21c.448-1.077 1.976-1.077 2.424 0l2.082 5.006 5.404.434c1.164.093 1.636 1.545.749 2.305l-4.117 3.527 1.257 5.273c.271 1.136-.964 2.033-1.96 1.425L12 18.354 7.373 21.18c-.996.608-2.231-.29-1.96-1.425l1.257-5.273-4.117-3.527c-.887-.76-.415-2.212.749-2.305l5.404-.434 2.082-5.005Z" clip-rule="evenodd" />
        </svg>
        <svg *ngFor="let _ of getEmptyStars(book.ourRating)" class="star-empty" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" style="width:0.875rem; height:0.875rem;">
          <path stroke-linecap="round" stroke-linejoin="round" d="M11.48 3.499a.562.562 0 0 1 1.04 0l2.125 5.111a.563.563 0 0 0 .475.345l5.518.442c.499.04.701.663.321.988l-4.204 3.602a.563.563 0 0 0-.182.557l1.285 5.385a.562.562 0 0 1-.84.61l-4.725-2.885a.562.562 0 0 0-.586 0L6.982 20.54a.562.562 0 0 1-.84-.61l1.285-5.386a.562.562 0 0 0-.182-.557l-4.204-3.602a.562.562 0 0 1 .321-.988l5.518-.442a.563.563 0 0 0 .475-.345L11.48 3.5Z" />
        </svg>
      </div>

      <!-- Category chips -->
      <div *ngIf="book.categories?.length" style="display:flex; flex-wrap:wrap; gap:0.25rem; margin-top:0.5rem;">
        <span *ngFor="let cat of book.categories!.slice(0,2)"
              style="font-size:0.65rem; padding:0.15rem 0.45rem; background:color-mix(in srgb, var(--accent) 12%, transparent); color:var(--accent); border-radius:9999px; font-weight:600; text-transform:uppercase; letter-spacing:0.06em;">
          {{ cat.name }}
        </span>
      </div>
    </a>
  </div>

</div>
