<div style="min-height:70vh; display:flex; align-items:center; justify-content:center; padding:3rem 1rem;">
  <div style="width:100%; max-width:420px;">

    <!-- Logo back to home -->
    <div style="text-align:center; margin-bottom:2.5rem;">
      <a routerLink="/" style="font-family:var(--font-serif); font-size:2rem; font-weight:900; color:var(--ink); text-decoration:none; letter-spacing:-0.02em;">
        ReadWorth<span style="color:var(--accent);">.</span>
      </a>
      <p style="font-size:0.8rem; color:var(--muted); margin-top:0.5rem; text-transform:uppercase; letter-spacing:0.12em;">Developer Access</p>
    </div>

    <div style="background:var(--surface); border:1.5px solid var(--border); border-radius:1.25rem; padding:2.5rem; box-shadow:0 8px 32px rgba(0,0,0,0.12);">
      <h1 style="font-family:var(--font-serif); font-size:1.75rem; font-weight:800; color:var(--ink); margin:0 0 0.375rem; text-align:center;">Admin Sign In</h1>
      <p style="font-size:0.8125rem; color:var(--muted); text-align:center; margin:0 0 2rem;">Authorised personnel only.</p>

      <!-- Error banner -->
      <div *ngIf="error"
           style="background:color-mix(in srgb, #dc2626 8%, transparent); border:1.5px solid color-mix(in srgb, #dc2626 30%, transparent); color:#dc2626; padding:0.75rem 1rem; border-radius:0.625rem; font-size:0.875rem; text-align:center; margin-bottom:1.5rem;">
        {{ error }}
      </div>

      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" style="display:flex; flex-direction:column; gap:1.25rem;">

        <!-- Username -->
        <div>
          <label for="admin-username" style="display:block; font-size:0.75rem; font-weight:700; text-transform:uppercase; letter-spacing:0.1em; color:var(--muted); margin-bottom:0.4rem;">Username</label>
          <input id="admin-username" type="text" formControlName="username" autocomplete="username"
                 placeholder="admin"
                 style="width:100%; box-sizing:border-box; padding:0.75rem 1rem; border:1.5px solid var(--border); border-radius:0.625rem; background:var(--paper); color:var(--ink); font-size:0.9375rem; outline:none; transition:border-color 0.2s;"
                 onfocus="this.style.borderColor='var(--accent)'"
                 onblur="this.style.borderColor='var(--border)'">
        </div>

        <!-- Password -->
        <div>
          <label for="admin-password" style="display:block; font-size:0.75rem; font-weight:700; text-transform:uppercase; letter-spacing:0.1em; color:var(--muted); margin-bottom:0.4rem;">Password</label>
          <div style="position:relative;">
            <input id="admin-password" [type]="showPassword ? 'text' : 'password'" formControlName="password" autocomplete="current-password"
                   placeholder="••••••••"
                   style="width:100%; box-sizing:border-box; padding:0.75rem 3rem 0.75rem 1rem; border:1.5px solid var(--border); border-radius:0.625rem; background:var(--paper); color:var(--ink); font-size:0.9375rem; outline:none; transition:border-color 0.2s;"
                   onfocus="this.style.borderColor='var(--accent)'"
                   onblur="this.style.borderColor='var(--border)'">
            <button type="button" (click)="showPassword = !showPassword"
                    style="position:absolute; right:0.875rem; top:50%; transform:translateY(-50%); background:none; border:none; cursor:pointer; color:var(--muted); padding:0.25rem; line-height:1;">
              <svg *ngIf="!showPassword" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" style="width:1.125rem; height:1.125rem;">
                <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 0 1 0-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178Z" /><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
              </svg>
              <svg *ngIf="showPassword" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" style="width:1.125rem; height:1.125rem;">
                <path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 0 0 1.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.451 10.451 0 0 1 12 4.5c4.756 0 8.773 3.162 10.065 7.498a10.522 10.522 0 0 1-4.293 5.774M6.228 6.228 3 3m3.228 3.228 3.65 3.65m7.894 7.894L21 21m-3.228-3.228-3.65-3.65m0 0a3 3 0 1 0-4.243-4.243m4.242 4.242L9.88 9.88" />
              </svg>
            </button>
          </div>
        </div>

        <!-- Submit -->
        <button id="admin-login-btn" type="submit" [disabled]="loginForm.invalid || loading"
                style="width:100%; padding:0.875rem; border:none; border-radius:0.625rem; background:var(--accent); color:#fff; font-size:0.9375rem; font-weight:700; cursor:pointer; transition:all 0.2s; margin-top:0.5rem; letter-spacing:0.02em;"
                [style.opacity]="loginForm.invalid || loading ? '0.6' : '1'"
                onmouseover="this.style.filter='brightness(1.1)'"
                onmouseout="this.style.filter='brightness(1)'">
          <span *ngIf="!loading">Sign In →</span>
          <span *ngIf="loading">Signing in…</span>
        </button>
      </form>

    </div>

    <p style="text-align:center; margin-top:1.5rem; font-size:0.8125rem; color:var(--muted);">
      <a routerLink="/" style="color:var(--accent); text-decoration:none; font-weight:600;">← Back to ReadWorth</a>
    </p>
  </div>
</div>
