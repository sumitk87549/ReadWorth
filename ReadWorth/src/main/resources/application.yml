spring:
  application:
    name: ReadWorth
  datasource:
    url: jdbc:h2:mem:readworth;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    defer-datasource-initialization: true
  flyway:
    enabled: false
  sql:
    init:
      mode: always
      data-locations: classpath:data.sql

jwt:
  secret: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
  expiration-ms: 14400000 # 4 hours

server:
  port: 8080
